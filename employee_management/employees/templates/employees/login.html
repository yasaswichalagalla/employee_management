<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Employee Management Login</h2>

<form method="POST">
    {% csrf_token %}

    <label>Username:</label>
    <input type="text" name="username">

    <br><br>

    <label>Password:</label>
    <input type="password" name="password">

    <br><br>

    <button type="submit">Login</button>

</form>

</body>
</html>
